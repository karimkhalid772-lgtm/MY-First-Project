<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
    }
    h1 {
      color: #333;
      margin-top: 20px;
    }
    .product {
      display: inline-block;
      margin: 20px;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      background-color: #fff;
      width: 180px;
    }
    .product img {
      width: 150px;
      height: 150px;
      object-fit: cover;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 8px 12px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <h1>My Store</h1>

  <div class="product">
    <img src="https://via.placeholder.com/150?text=iPhone+16" alt="iPhone 16">
    <h3>iPhone 16</h3>
    <button>Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150?text=Headphones" alt="Headphones">
    <h3>Headphones</h3>
    <button>Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150?text=Smart+Watch" alt="Smart Watch">
    <h3>Smart Watch</h3>
    <button>Add to Cart</button>
  </div>

  <script>
    const buttons = document.querySelectorAll('button');
    buttons.forEach(button => {
      button.addEventListener('click', () => {
        alert("Item added to cart!");
      });
    });
  </script>
</body>
</html>
